{{ define "title" }}{{ .Site.Title }}{{ end }}

{{ define "main" -}}
<main class="main layout__main fade-in">
    <h2 class="main__header">{{ .Title }}</h2>
    <article class="{{ with .Section }}section-{{ . | urlize }} {{ end }}single-view text-center">
        <div class="about-me">
            {{ .Content }}
        </div>
    </article>

</main>
{{ end }}
