{{ define "main" -}}
<main class="main layout__main">
    <h1 class="title">{{ .Title }}</h1>
    <div class="content">
        {{ .Content }}
        <ul>
            {{ range sort .Sections}}
            <li>
                <a class="" href="{{ .Permalink }}" target="blank">{{.Title}}</a>
                <!-- TODO: add date of the slides -->
            </li>
            {{ end }}
        </ul>
    </div>
</main>
{{ end }}
