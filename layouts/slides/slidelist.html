{{ define "main" -}}
<main class="main layout__main">
    <h1 class="title">{{ .Title }}</h1>
    <div class="content">
        {{ .Content }}
        <ul class="slide-list">
            {{ range .Pages}}
            <li class="slide-item">
                <div>
                    <span class="slide-item__date">{{ .Date.Format "02 Jan 2006" }}</span>
                    <span class="slide-item__separator"> > </span>
                    <a class="slide-item__link" href="{{ .Permalink }}" target="blank">{{.Title}}</a>
                </div>
                {{ with .Params.event_name }}
                <div class="slide-item__event-name">
                    {{ . }}
                </div>
                {{ end }}
            </li>
            {{ end }}
        </ul>
    </div>
</main>
{{ end }}
